# ==============================================================================
# AlphaForge V2 Master Settings
# 
# 이 파일의 모든 임계값은 런타임에 동적으로 로드되며, 
# 코드베이스에서 하드코딩된 값을 대체합니다.
# ==============================================================================

# ── 1. Layer 1: 기술적 패턴 필터 ──────────────────────────────────────────────
vcp_min_score: 70          # VCP 통과 최소 점수 (0~100점). 권고: 65~75
vcp_lookback_days: 120     # VCP 패턴 식별을 위한 과거 일봉 조회 기간 (기본 120)
vcp_pivot_window: 5        # 피벗 고점 식별 시 좌우 기준 윈도우 (기본 5)
vcp_max_depth_pct: 50      # 이 수치 이상의 급락은 수축 파동으로 인정하지 않음 (%)

breakout_vol_A: 2.0        # A등급 돌파: 20일 평균 거래량 대비 배수
breakout_vol_B: 1.5        # B등급 돌파: 20일 평균 거래량 대비 배수
breakout_vol_C: 1.0        # C등급 돌파: 20일 평균 거래량 대비 배수 (이하 D등급 탈락)

# ── 2. Layer 2: 수급 필터 ───────────────────────────────────────────────────
flow_days_short: 5         # 단기 수급 기준일 (기존과 동일)
flow_days_mid: 60          # 중기 수급 장기 매집 확인 (60일 누적)
flow_days_long: 120        # 장기 수급 우상향 확인 (120일 추세)

# ── 3. Layer 3: 상대 강도(RS) 필터 ──────────────────────────────────────────
rs_min_rating: 80          # RS 최소 백분위 점수. 권고: 75~85 (IBD 표준 80)

# ── 4. Layer 4: 구조적 리스크 경고 ──────────────────────────────────────────
sector_cluster_warn: 3     # 동일 섹터 내 종목이 이 개수 이상일 때 집중 리스크 경고 발생

# ── 5. Layer 0: 거시 국면 (Macro) ───────────────────────────────────────────
vix_penalty_start: 22      # 이 VIX 수치부터 점수 감점 시작 (Phase 2 연동용)
vix_hard_block: 30         # 이 VIX 수치 초과 시 신호 전면 차단 (RED 국면)
vix_relative_threshold: 1.3 # VIX / 20MA 괴리율 한계선 (1.3배 이상 시 경고)
us10y_warn: 4.6            # 미 국채 10년물 금리 경고선 (%)
dxy_warn: 104              # 달러 인덱스 경고선

# ── 6. 점수 가중치 (Weights) ────────────────────────────────────────────────
# 총점 합계는 반드시 1.0 이어야 합니다.
weights:
  vcp_score: 0.25          # VCP 품질 점수
  breakout_grade: 0.20     # 돌파 등급 점수
  rs_rating: 0.20          # 상대 강도 점수
  flow_quality: 0.20       # 수급 점수
  sector_check: 0.10       # 섹터 리스크
  macro_display: 0.05      # 거시 연동 (Phase 2에서 본격 사용)
